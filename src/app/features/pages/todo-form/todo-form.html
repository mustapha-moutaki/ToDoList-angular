

<h2>to do form</h2>
<form action="" [formGroup]="form" (ngSubmit)="createTask()">
    <input type="text" placeholder="Task title" formControlName = "title">
    <input type="text" placeholder="Task description" formControlName = "description">
     <select formControlName="priority">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="Highlight">Highlight</option>
  </select>

  <select name="status" id="" formControlName="status">
    <option value="pending">pending</option>
    <option value="done">done</option>
  </select>

  <button type="submit">add</button>

</form>


<div>
    <h3>Tasks list</h3>
    
    <div *ngFor="let task of tasks()">
        <p>{{task.title}}</p>
        <p>{{task.description}}</p>
        <p>{{task.dueDate}}</p>
        <p>{{task.status}}</p>
        <p>{{task.priority}}</p>
    </div>
</div>
